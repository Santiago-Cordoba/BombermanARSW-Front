<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Partida</title>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@5.5.1/bundles/stomp.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="config-container">
    <h1>Configurar Partida</h1>

    <label for="duration">Duración:</label>
    <select id="duration">
        <option value="2">2 Min</option>
        <option value="5">5 Min</option>
        <option value="10">10 Min</option>
    </select>

    <label for="players">Número de Jugadores (1-4):</label>
    <input type="number" id="players" min="1" max="4">

    <label for="blocks">Número de Bloques (1-30):</label>
    <input type="number" id="blocks" min="1" max="30">

    <label for="lives">Número de Vidas (1-10):</label>
    <input type="number" id="lives" min="1" max="10">

    <button onclick="sendConfig()">Establecer Configuración</button>
</div>

<script src="app.js"></script>
</body>
</html>
